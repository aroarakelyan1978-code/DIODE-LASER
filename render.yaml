services:
  - type: web
    name: an-yan-diode-laser
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: BRAND_NAME
        value: An Yan Diode Laser
      - key: BUSINESS_PHONE_NUMBER
        value: +18182038752
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
